name: smart-fill-agents

services:
  # ===== 우리 앱 =====
  # be가 API(/api/v1/*)와 프론트엔드(바닐라 HTML/JS, be/app/static)를 함께 서빙한다.
  # → UI 접속 주소: http://localhost:8001 (sunshot 8000과 분리)
  be:
    container_name: be
    build: ./be
    env_file: .env
    # 개발 편의: 소스 마운트 + 자동 리로드 (코드/정적파일 수정 시 새로고침으로 반영)
    volumes:
      - ./be:/app
      - ./data:/data   # 디버그용: 변환된 PDF 저장 위치
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8001:8000"
    depends_on:
      milvus:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===== 대화 영속화 (LangGraph checkpointer) =====
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-agents}
    volumes:
      - ./docker/volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Milvus 스택 (milvus + etcd + minio) =====
  etcd:
    container_name: etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./docker/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./docker/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus GUI (DBeaver 같은 관리 툴). 필수 아님 — 보고 싶을 때만 띄워도 됨.
  attu:
    container_name: attu
    image: zilliz/attu:v2.4
    environment:
      MILVUS_URL: milvus:19530   # 같은 compose 네트워크라 서비스명으로 연결
    ports:
      - "8100:3000"              # 호스트 8100 -> 컨테이너 3000 (be의 8000과 분리)
    depends_on:
      - milvus
    restart: unless-stopped

  milvus:
    container_name: milvus
    image: milvusdb/milvus:v2.4.4
    platform: linux/amd64   # 이 태그는 amd64만 제공 → arm 맥에서 에뮬레이션 (플랫폼 명시로 경고 제거)
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./docker/volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC
      - "9091:9091"     # metrics/health
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
